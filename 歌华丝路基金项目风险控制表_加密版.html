<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌华丝路基金项目风险控制表</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
/* ========== DESIGN SYSTEM ========== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Space+Grotesk:wght@300;400;500;600;700&family=Work+Sans:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600&display=swap');

:root {
  --paper: #FAFADF;
  --cream: #F5F0E4;
  --cream-alt: #EEE9D8;
  --ink: #1A1A16;
  --ink-2: #5E5E54;
  --ink-3: #8A8A7E;
  --rule: #D5D0C0;
  --rule-light: #E5E0D2;
  --hover: #F0ECD8;
  --radius: 4px;
  --font-serif: 'Lora', 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
  --font-body: 'Jost', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
  font-size: 14px;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
}

/* ========== HEADER ========== */
.header {
  background: var(--cream);
  color: var(--ink);
  padding: 0 32px;
  height: 52px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid var(--ink);
}
.header h1 {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.header-actions { display: flex; gap: 12px; align-items: center; }
.sync-status {
  font-size: 11px;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
}
.sync-dot {
  width: 5px; height: 5px; border-radius: 50%; display: inline-block;
}
.sync-dot.on  { background: var(--ink); }
.sync-dot.off { background: var(--ink-3); }

/* ========== FLOATING THEME SWITCHER ========== */
.theme-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 99;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--cream);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 6px 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  opacity: 0.75;
  transition: opacity 0.2s;
}
.theme-float:hover { opacity: 1; }
.theme-float-label {
  font-size: 10px;
  color: var(--ink-3);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
}
.theme-float select {
  padding: 3px 6px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  font-size: 11px;
  outline: none;
  background: transparent;
  cursor: pointer;
  font-family: var(--font-body);
  color: var(--ink-2);
  max-width: 130px;
}
.theme-float select:focus { border-color: var(--ink); }
.theme-float select option { background: var(--cream); color: var(--ink); }

/* ========== BUTTONS ========== */
.btn {
  padding: 6px 16px;
  border: 1px solid var(--ink);
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: var(--font-body);
  letter-spacing: 0.01em;
  background: transparent;
  color: var(--ink);
}
.btn:hover { background: var(--ink); color: var(--paper); }
.btn-primary { background: var(--ink); color: var(--paper); }
.btn-primary:hover { background: #33332E; border-color: #33332E; }
.btn-outline { background: transparent; color: var(--ink-2); border-color: var(--ink-3); }
.btn-outline:hover { color: var(--ink); border-color: var(--ink); background: transparent; }
.btn-export { background: transparent; color: var(--ink); border-color: var(--rule); }
.btn-export:hover { background: var(--hover); border-color: var(--ink); }
.btn-sm { padding: 5px 12px; font-size: 11px; }
.url-input {
  padding: 5px 10px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  font-size: 11px;
  outline: none;
  font-family: var(--font-mono);
  background: var(--cream);
  color: var(--ink-2);
  width: 220px;
  transition: all 0.15s;
}
.url-input:focus { border-color: var(--ink); background: var(--paper); }
.url-input::placeholder { color: var(--ink-3); }

/* ========== VIEW TOGGLE ========== */
.view-toggle {
  display: flex;
  background: var(--cream-alt);
  border-radius: 3px;
  padding: 2px;
  border: 1px solid var(--rule);
}
.view-btn {
  padding: 5px 16px;
  border: none;
  cursor: pointer;
  font-size: 12px;
  border-radius: 2px;
  background: transparent;
  color: var(--ink-3);
  transition: all 0.15s;
  font-family: var(--font-body);
  font-weight: 500;
}
.view-btn.active {
  background: var(--paper);
  color: var(--ink);
  font-weight: 600;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

/* ========== SUMMARY ROW ========== */
.summary-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1px;
  background: var(--rule);
  margin: 20px 28px 0;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
}
.summary-card {
  background: var(--cream);
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: pointer;
  transition: background 0.15s;
}
.summary-card:hover { background: var(--hover); }
.summary-card--alert .summary-num { font-weight: 700; }
.summary-card--warn .summary-num  { font-weight: 600; font-style: italic; }
.summary-num {
  font-family: var(--font-serif);
  font-size: 30px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
}
.summary-label {
  font-size: 11px;
  color: var(--ink-2);
  font-weight: 400;
  letter-spacing: 0.02em;
}

/* ========== TABS ========== */
.tab-bar {
  display: flex;
  gap: 0;
  padding: 0 28px;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  overflow-x: auto;
  align-items: center;
  margin-top: 20px;
}
.tab {
  padding: 10px 18px;
  cursor: pointer;
  font-size: 13px;
  color: var(--ink-2);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
  white-space: nowrap;
  font-weight: 400;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }
.tab .count { font-size: 10px; margin-left: 3px; opacity: 0.5; font-family: var(--font-mono); }
.tab.active .count { opacity: 1; }
.tab-right { display: flex; gap: 10px; align-items: center; padding-right: 4px; margin-left: auto; }

/* Sub-tabs */
.sub-tab-bar {
  display: flex;
  gap: 0;
  padding: 0 28px;
  background: var(--cream);
  border-bottom: 1px solid var(--rule);
  overflow-x: auto;
  align-items: center;
}
.sub-tab {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 12px;
  color: var(--ink-2);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
  white-space: nowrap;
  font-weight: 400;
}
.sub-tab:hover { color: var(--ink); }
.sub-tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }
.sub-tab .count { font-size: 10px; margin-left: 2px; opacity: 0.5; font-family: var(--font-mono); }
.sub-tab.active .count { opacity: 1; }
.sub-tab.star { font-style: italic; }
.sub-tab.star.active { border-bottom-color: var(--ink); }

/* ========== TOOLBAR ========== */
.toolbar {
  display: flex;
  gap: 10px;
  padding: 12px 28px;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 180px;
  padding: 7px 14px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  font-size: 13px;
  outline: none;
  font-family: var(--font-body);
  background: var(--cream);
  transition: all 0.15s;
  color: var(--ink);
}
.search-box:focus { border-color: var(--ink); background: var(--paper); }
.search-box::placeholder { color: var(--ink-3); }
.filter-select {
  padding: 7px 12px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  font-size: 13px;
  outline: none;
  background: var(--cream);
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
  color: var(--ink);
}
.filter-select:focus { border-color: var(--ink); }
.result-count {
  font-size: 11px;
  color: var(--ink-2);
  white-space: nowrap;
  font-family: var(--font-mono);
}

/* ========== TABLE (Ledger) ========== */
.table-container {
  margin: 0 28px 24px;
  background: var(--cream);
  border-radius: var(--radius);
  border: 1px solid var(--rule);
  overflow: hidden;
}
.table-wrapper { overflow-x: auto; max-height: 56vh; overflow-y: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 900px;
  table-layout: fixed;
}
thead { position: sticky; top: 0; z-index: 2; }
th {
  background: var(--ink);
  color: var(--paper);
  padding: 10px 12px;
  text-align: left;
  font-weight: 500;
  font-size: 11px;
  white-space: normal;
  cursor: pointer;
  user-select: none;
  letter-spacing: 0.03em;
  font-family: var(--font-body);
}
th:hover { background: #33332E; }
th .sort-icon { margin-left: 2px; font-size: 10px; opacity: 0.6; }
td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--rule-light);
  vertical-align: top;
  font-size: 13px;
  color: var(--ink);
  white-space: pre-line;
  word-break: break-word;
  overflow-wrap: anywhere;
  line-height: 1.5;
}
td:first-child, th:first-child {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-2);
}
tr:last-child td { border-bottom: none; }
.ci {
  max-width: 100%;
  white-space: pre-line;
  word-break: break-word;
  overflow-wrap: anywhere;
}
tr:hover td { background: var(--hover); }

/* 权利矩阵条款字段统一换行 — 兜底 */
.rights-matrix td,
.matrix-table td,
.repurchase-right,
.rights-text,
.ci--repurchase {
  white-space: pre-line !important;
  word-break: break-word !important;
  overflow-wrap: anywhere !important;
  line-height: 1.6;
}

/* ========== BADGES (Monochrome) ========== */
.badge {
  padding: 2px 8px;
  border-radius: 2px;
  font-size: 10px;
  font-weight: 500;
  white-space: nowrap;
  display: inline-block;
  letter-spacing: 0.02em;
}
.badge-danger {
  background: var(--ink);
  color: var(--paper);
  font-weight: 600;
}
.badge-warning {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--ink);
  font-weight: 500;
}
.badge-success {
  background: var(--cream-alt);
  color: var(--ink-2);
  font-weight: 400;
}
.badge-info {
  background: transparent;
  color: var(--ink-2);
  font-style: italic;
  font-weight: 400;
}
.badge-gray {
  background: transparent;
  color: var(--ink-3);
  border: 1px solid var(--rule);
}

/* ========== CARD GRID ========== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 16px;
  padding: 20px 28px 28px;
}
.project-card {
  background: var(--cream);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.15s;
}
.project-card:hover {
  border-color: var(--ink);
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.project-card.starred {
  border-color: var(--ink);
  border-width: 2px;
}

/* Card internals */
.card-main { padding: 16px 18px; }
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}
.card-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.01em;
}
.card-star {
  font-size: 18px;
  cursor: pointer;
  color: var(--rule);
  transition: all 0.15s;
  user-select: none;
  font-style: normal;
}
.card-star.active { color: var(--ink); }
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
.card-biz-kw {
  font-size: 10px;
  color: var(--ink-2);
  background: var(--cream-alt);
  padding: 2px 7px;
  border-radius: 2px;
  font-weight: 400;
  letter-spacing: 0.02em;
  white-space: nowrap;
  border: 1px solid var(--rule);
}
.card-meta {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px 12px;
  margin-bottom: 10px;
}
.card-meta-item { font-size: 12px; display: flex; flex-direction: column; }
.card-meta-item .label {
  font-family: var(--font-mono);
  color: var(--ink-3);
  font-size: 9px;
  letter-spacing: 0.04em;
  margin-bottom: 1px;
}
.card-meta-item .value {
  color: var(--ink);
  font-weight: 500;
}

/* Card sections */
.card-section {
  padding: 10px 18px;
  border-top: 1px solid var(--rule-light);
  font-size: 12px;
}
.card-section-title {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--ink-2);
  letter-spacing: 0.05em;
  margin-bottom: 5px;
}
.card-section .line {
  margin-bottom: 3px;
  display: flex;
  gap: 6px;
  color: var(--ink);
  flex-wrap: wrap;
  word-break: break-word;
}
.card-section .dot { color: var(--ink-3); flex-shrink: 0; }

/* ========== EMPTY STATE & DROP ZONE ========== */
.empty-state { text-align: center; padding: 64px 20px; color: var(--ink-2); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
.empty-state h3 {
  font-family: var(--font-serif);
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
}
.drop-zone {
  border: 1px dashed var(--ink-3);
  border-radius: var(--radius);
  padding: 48px;
  text-align: center;
  margin: 36px 32px;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--cream);
}
.drop-zone:hover { border-color: var(--ink); background: var(--hover); }
.drop-zone .icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
.drop-zone p { font-size: 14px; color: var(--ink-2); }

/* ========== FOOTER ========== */
.footer {
  text-align: center;
  padding: 14px;
  font-size: 11px;
  color: var(--ink-3);
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
}

.hidden { display: none; }

/* ========== PASSWORD GATE (encrypted export) ========== */
.pw-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--paper);
  display: flex; align-items: center; justify-content: center;
}
.pw-box {
  background: var(--cream);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 40px 48px;
  text-align: center;
  max-width: 400px;
  width: 90%;
}
.pw-box h2 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--ink);
}
.pw-box .pw-sub {
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 20px;
}
.pw-box input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  font-size: 14px;
  outline: none;
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  text-align: center;
  letter-spacing: 0.1em;
}
.pw-box input:focus { border-color: var(--ink); }
.pw-box .pw-err {
  font-size: 11px;
  color: var(--ink-2);
  margin-top: 10px;
  min-height: 16px;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .summary-row { margin: 16px 14px 0; }
  .tab-bar, .sub-tab-bar, .toolbar { padding: 8px 14px; }
  .table-container, .card-grid { margin: 0 14px 16px; }
  .card-grid { grid-template-columns: 1fr; }
  .header { padding: 0 16px; }
  .drop-zone { margin: 24px 14px; padding: 32px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>歌华丝路基金项目风险控制表</h1>
  <div class="header-actions">
    <span class="sync-status" id="syncStatus">
      <span class="sync-dot off" id="syncDot"></span>
      <span id="syncText">未加载数据</span>
    </span>
    
    <button class="btn btn-primary" id="btnSelect" onclick="selectFile()">选择 Excel</button>
    <button class="btn btn-outline btn-sm" id="btnRefresh" onclick="refreshData()">手动刷新</button>
    
  </div>
</div>

<div id="dropZone" class="drop-zone" onclick="selectFile()">
  <div class="icon">📊</div>
  <p>拖拽 Excel 文件到此处，或点击选择文件</p>
  <p style="font-size:12px;margin-top:6px;">选择「歌华丝路已投项目总览.xlsx」后自动同步</p>
</div>

<div id="mainContent" class="hidden">
  <div class="summary-row" id="summaryRow"></div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="sub-tab-bar hidden" id="subTabBar"></div>
  <div class="toolbar">
    <input type="text" class="search-box" id="searchInput" placeholder="搜索项目..." oninput="applyFilters()">
    <select class="filter-select" id="statusFilter" onchange="applyFilters()"><option value="">全部状态</option></select>
    <span class="result-count" id="resultCount"></span>
  </div>
  <div class="table-container"><div class="table-wrapper" id="tableWrapper"></div></div>
  <div class="card-grid hidden" id="cardGrid"></div>
</div>

<div class="footer">🔒 加密版 · 输入密码后解密数据 · 数据不在服务器留存</div>

<div class="theme-float" id="themeFloat">
  <span class="theme-float-label">风格</span>
  <select id="themeSelect" onchange="switchTheme(this.value)" title="切换风格"></select>
</div>

<script>
// ==================== STATE ====================
let workbook = null;
let sheetData = [];
let fileHandle = null;
let lastModified = 0;
let pollTimer = null;
let manualFile = null; // retained reference for manual file polling
let currentSheetName = '投资概览';
let currentTab = '全部';
let currentView = 'table';
let starred = JSON.parse(localStorage.getItem('sgc_starred') || '[]');
const POLL_INTERVAL = 30000;

const dangerKW = ['已触发','已违约','已逾期','触发','违约','逾期'];
const warningKW = ['关注中','临近到期','待确认','待补充'];
const successKW = ['正常','已解决','已投'];

function statusBadge(text) {
  if (!text) return '';
  const s = String(text);
  let cls = 'badge-gray';
  if (dangerKW.some(k => s.includes(k))) cls = 'badge-danger';
  else if (warningKW.some(k => s.includes(k))) cls = 'badge-warning';
  else if (successKW.some(k => s.includes(k))) cls = 'badge-success';
  return `<span class="badge ${cls}">${escapeHtml(s)}</span>`;
}

function phaseBadge(phase) {
  const map = { '已投': 'badge-success', '尽调中': 'badge-warning', '终止': 'badge-danger', '储备': 'badge-info' };
  return `<span class="badge ${map[phase]||'badge-gray'}">${phase||'未知'}</span>`;
}

function escapeHtml(str) {
  const d = document.createElement('div'); d.textContent = String(str||''); return d.innerHTML;
}

function findColIdx(header, keywords) {
  for (let i = 0; i < header.length; i++) {
    const h = String(header[i] || '');
    if (keywords.some(k => h.includes(k))) return i;
  }
  return -1;
}

function findSheet(namePat) { return sheetData.find(s => s.name.includes(namePat)); }

// Detect the real header row (skip title/subtitle rows from Excel)
const KNOWN_HEADERS = ['序号','项目名称','风险类别','日期类型','投资主体','项目阶段'];

function findHeaderRow(rows) {
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const row = rows[i];
    if (!row || row.length === 0) continue;
    const cells = row.filter(c => c !== '' && c !== null && c !== undefined);
    if (cells.length < 2) continue;
    const matchCount = cells.filter(c => KNOWN_HEADERS.some(h => String(c).includes(h))).length;
    if (matchCount >= 2) return i;
  }
  return 0; // fallback: first row
}

// ==================== FILE HANDLING ====================
async function selectFile() {
  if (window.showOpenFilePicker) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Excel', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } }]
      });
      fileHandle = handle;
      lastModified = (await handle.getFile()).lastModified;
      await loadFromHandle();
      startPolling();
      return;
    } catch(e) {}
  }
  document.getElementById('fileInput').click();
}

function handleFileEvent(e) {
  const file = e.target.files[0];
  if (!file) return;
  manualFile = file;
  lastModified = file.lastModified;
  readFile(file);
  document.getElementById('btnRefresh').classList.remove('hidden');
  updateSyncStatus(true);
  startPolling();
}

async function loadFromHandle() {
  const file = await fileHandle.getFile();
  readFile(file);
  updateSyncStatus(true);
}

function readFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      workbook = XLSX.read(data, { type: 'array' });
      sheetData = [];
      const skipNames = ['使用说明'];
      for (const name of workbook.SheetNames) {
        if (skipNames.includes(name)) continue;
        const ws = workbook.Sheets[name];
        const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        if (raw.length === 0) continue;
        const hIdx = findHeaderRow(raw);
        // Check for per-sheet column visibility control row
     let sheetVis = null;
     if (hIdx > 0) {
       for (let offset = 1; offset <= 2; offset++) {
         if (hIdx - offset < 0) continue;
         const ctrlRow = raw[hIdx - offset];
         if (ctrlRow && ctrlRow.some(c => { const v = String(c).trim(); return v === '是' || v === '否'; })) {
           sheetVis = ctrlRow.map(c => String(c).trim() !== '否');
           break;
         }
       }
     }
     const rows = raw.slice(hIdx);
        if (rows.length > 1) sheetData.push({ name, rows, columnVisible: sheetVis });
      }
      if (sheetData.length === 0) { alert('未找到有效数据Sheet'); return; }
      buildUI();
      document.getElementById('dropZone').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      document.getElementById('btnSelect').textContent = '重新选择';
      document.getElementById('btnEncrypt').style.display = '';
    } catch(err) {
      alert('读取 Excel 失败: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}


// ==================== REMOTE URL FETCH ====================
async function fetchFromUrl(url, isRefresh) {
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.arrayBuffer();
    const file = new File([data], 'remote.xlsx');
    manualFile = file;
    lastModified = Date.now();
    readFile(file);
    document.getElementById('btnRefresh').classList.remove('hidden');
    updateSyncStatus(true);
    startPolling();
    if (!isRefresh) {
      document.getElementById('urlInput').value = url;
      localStorage.setItem('sgc_excel_url', url);
    }
    return true;
  } catch(e) {
    if (isRefresh) alert('远程刷新失败: ' + e.message);
    return false;
  }
}

function setRemoteUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { localStorage.removeItem('sgc_excel_url'); alert('已清除远程 URL'); return; }
  localStorage.setItem('sgc_excel_url', url);
  fetchFromUrl(url, true);
}
async function refreshData() {
  if (fileHandle) { await loadFromHandle(); return; }
  if (manualFile) {
    readFile(manualFile);
    updateSyncStatus(true);
    return;
  }
  if (document.getElementById('fileInput').files.length > 0) {
    manualFile = document.getElementById('fileInput').files[0];
    readFile(manualFile);
    updateSyncStatus(true);
    return;
  }
  // Try remote URL
  const url = localStorage.getItem('sgc_excel_url');
  if (url) { await fetchFromUrl(url, true); return; }
  alert('未找到数据源。请重新选择 Excel 文件，或设置远程数据 URL。');
}

function updateSyncStatus(active) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (active) {
    dot.className = 'sync-dot on';
    txt.textContent = '已同步 ' + new Date().toLocaleTimeString();
  } else {
    dot.className = 'sync-dot off';
    txt.textContent = '手动模式';
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      // Check File System Access API handle first
      if (fileHandle) {
        const file = await fileHandle.getFile();
        if (file.lastModified > lastModified) {
          lastModified = file.lastModified;
          readFile(file);
          updateSyncStatus(true);
          return;
        }
      }
      // Check manual file reference
      if (manualFile && manualFile.lastModified > lastModified) {
        lastModified = manualFile.lastModified;
        readFile(manualFile);
        updateSyncStatus(true);
      }
    } catch(e) {}
  }, POLL_INTERVAL);
}

function buildTabs() {
  const tabBar = document.getElementById('tabBar');
  const subBar = document.getElementById('subTabBar');

  // Sheet tabs
  const sheetNames = sheetData.map(s => s.name);
  let html = '';
  sheetNames.forEach(name => {
    const sheet = findSheet(name);
    const cnt = sheet ? Math.max(0, sheet.rows.length - 1) : 0;
    html += `<div class="tab ${currentSheetName===name?'active':''}" onclick="switchSheet('${name}')">${name}<span class="count">${cnt}</span></div>`;
  });
  html += `<div class="tab-right">
    <span style="font-size:12px;color:var(--ink-2);">视图</span>
    <div class="view-toggle">
      <button class="view-btn ${currentView==='table'?'active':''}" data-view="table" onclick="setView('table')">表格</button>
      <button class="view-btn ${currentView==='card'?'active':''}" data-view="card" onclick="setView('card')">卡片</button>
    </div>
    <button class="btn btn-export btn-sm" onclick="exportExcel()">导出 Excel</button>
  </div>`;
  tabBar.innerHTML = html;

  // Sub-tabs: only for 投资概览
  const isOverview = currentSheetName.includes('投资概览');
  if (isOverview) {
    subBar.classList.remove('hidden');
    const s1 = findSheet('投资概览');
    const phases = new Set();
    if (s1) {
      const phaseCol = findColIdx(s1.rows[0], ['项目阶段']);
      for (let r = 1; r < s1.rows.length; r++) {
        const p = String(s1.rows[r][phaseCol] || '').trim();
        if (p) phases.add(p);
      }
    }
    const phaseOrder = ['已投', '尽调中', '终止', '储备'];
    const ordered = phaseOrder.filter(p => phases.has(p));
    phases.forEach(p => { if (!ordered.includes(p)) ordered.push(p); });

    let subHtml = `<div class="sub-tab ${currentTab==='全部'?'active':''}" onclick="setTab('全部')">全部<span class="count">${s1?s1.rows.length-1:0}</span></div>`;
    ordered.forEach(p => {
      subHtml += `<div class="sub-tab ${currentTab===p?'active':''}" onclick="setTab('${p}')">${p}<span class="count">${countPhase(p)}</span></div>`;
    });
    subHtml += `<div class="sub-tab star ${currentTab==='★'?'active':''}" onclick="setTab('★')">★ 我的关注<span class="count" id="starCount">${starred.length}</span></div>`;
    subBar.innerHTML = subHtml;
  } else {
    subBar.classList.add('hidden');
    subBar.innerHTML = '';
  }
}

function countPhase(phase) {
  const s1 = findSheet('投资概览');
  if (!s1) return 0;
  const phaseCol = findColIdx(s1.rows[0], ['项目阶段']);
  if (phaseCol < 0) return 0;
  let cnt = 0;
  for (let r = 1; r < s1.rows.length; r++) {
    if (String(s1.rows[r][phaseCol] || '').trim() === phase) cnt++;
  }
  return cnt;
}

function buildSummary() {
  const s1 = findSheet('投资概览');
  const s3 = findSheet('风险点');
  const s4 = findSheet('日期');

  let total = 0, invested = 0, dd = 0, stopped = 0, highRisk = 0, triggered = 0, upcoming = 0;

  if (s1) {
    const phaseCol = findColIdx(s1.rows[0], ['项目阶段']);
    const statusCol = findColIdx(s1.rows[0], ['当前状态']);
    total = Math.max(0, s1.rows.length - 1);
    for (let r = 1; r < s1.rows.length; r++) {
      const p = String(s1.rows[r][phaseCol] || '').trim();
      const st = String(s1.rows[r][statusCol] || '').trim();
      if (p === '已投') invested++;
      else if (p === '尽调中') dd++;
      else if (p === '终止') stopped++;
      if (dangerKW.some(k => st.includes(k))) triggered++;
    }
  }
  if (s3) {
    for (let r = 1; r < s3.rows.length; r++) {
      if (String(s3.rows[r][4] || '').trim() === '高') highRisk++;
      if (dangerKW.slice(0,3).some(k => String(s3.rows[r][5]||'').includes(k))) triggered++;
    }
  }
  if (s4) {
    for (let r = 1; r < s4.rows.length; r++) {
      const st = String(s4.rows[r][4] || '');
      if (st.includes('临近')) upcoming++;
      if (st.includes('逾期')) triggered++;
    }
  }

  document.getElementById('summaryRow').innerHTML = `
    <div class="summary-card" onclick="switchSheet('投资概览');setTab('全部')"><div class="summary-num">${total}</div><div class="summary-label">全部项目</div></div>
    <div class="summary-card" onclick="switchSheet('投资概览');setTab('已投')"><div class="summary-num">${invested}</div><div class="summary-label">已投</div></div>
    <div class="summary-card" onclick="switchSheet('投资概览');setTab('尽调中')"><div class="summary-num">${dd}</div><div class="summary-label">尽调中</div></div>
    <div class="summary-card" onclick="switchSheet('投资概览');setTab('终止')"><div class="summary-num">${stopped}</div><div class="summary-label">终止</div></div>
    <div class="summary-card summary-card--alert"><div class="summary-num">${highRisk}</div><div class="summary-label">高风险项</div></div>
    <div class="summary-card summary-card--warn"><div class="summary-num">${upcoming}</div><div class="summary-label">临近到期</div></div>
    <div class="summary-card summary-card--alert"><div class="summary-num">${triggered}</div><div class="summary-label">已触发/逾期</div></div>
  `;
}

// ==================== DATA FILTERING ====================
function getFilteredRows(sheet) {
  if (!sheet || sheet.rows.length < 2) return { header: [], rows: [] };
  const header = [...sheet.rows[0]];
  let rows = sheet.rows.slice(1).map(r => [...r]);

  // Compute date fields for key dates sheet
  if (sheet.name && (sheet.name.includes('日期') || sheet.name.includes('关键'))) {
    rows.forEach(r => computeDateFields(r));
  }

  // Phase filter (only for 投资概览)
  if (sheet.name && sheet.name.includes('投资概览') && currentTab !== '全部' && currentTab !== '★') {
    const phaseCol = findColIdx(header, ['项目阶段']);
    if (phaseCol >= 0) rows = rows.filter(r => String(r[phaseCol] || '').trim() === currentTab);
  }

  // Star filter
  if (currentTab === '★') {
    const nameCol = findColIdx(header, ['项目名称']);
    if (nameCol >= 0) rows = rows.filter(r => starred.includes(String(r[nameCol] || '').trim()));
  }

  // Search
  const search = document.getElementById('searchInput').value.toLowerCase();
  if (search) rows = rows.filter(r => r.some(c => String(c || '').toLowerCase().includes(search)));

  // Status select filter
  const sf = document.getElementById('statusFilter').value;
  if (sf) {
    const sc = findColIdx(header, ['当前状态', '严重程度', '提醒']);
    if (sc >= 0) rows = rows.filter(r => String(r[sc] || '').trim() === sf);
  }

  return { header, rows };
}

function applyFilters() {
  const sheet = findSheet(currentSheetName) || sheetData[0];
  if (!sheet) return;

  const { header, rows } = getFilteredRows(sheet);
  const statusFilter = document.getElementById('statusFilter');
  const currentVal = statusFilter.value;
  statusFilter.innerHTML = '<option value="">全部状态</option>';
  const sc = findColIdx(header, ['当前状态', '严重程度', '提醒']);
  if (sc >= 0) {
    const vals = new Set();
    sheet.rows.slice(1).forEach(r => { const v = String(r[sc] || '').trim(); if (v) vals.add(v); });
    vals.forEach(v => {
      const opt = document.createElement('option'); opt.value = v; opt.textContent = v;
      if (v === currentVal) opt.selected = true;
      statusFilter.appendChild(opt);
    });
  }

  document.getElementById('resultCount').textContent = `${rows.length} 条结果`;

  if (currentView === 'table') renderTable({ name: sheet.name, rows: [header, ...rows] });
  else renderCards({ name: sheet.name, rows: [header, ...rows] });
}

  cardGrid.classList.add('hidden');

  if (sheet.rows.length < 2) {
    wrapper.innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>暂无数据</h3></div>';
    return;
  }
  const header = sheet.rows[0], dataRows = sheet.rows.slice(1);
  const statusCol = findColIdx(header, ['当前状态', '严重程度', '提醒', '项目阶段']);

  let filtered = [...dataRows];
  if (sortCol >= 0) {
    filtered.sort((a, b) => {
      const va = String(a[sortCol] || '').trim(), vb = String(b[sortCol] || '').trim();
      const na = parseFloat(va), nb = parseFloat(vb);
      if (!isNaN(na) && !isNaN(nb)) return (na - nb) * sortDir;
      return va.localeCompare(vb, 'zh') * sortDir;
    });
  }

  // Build visible column indices (skip "是否在看板显示" and columns marked 否)
  const visCols = [];
  header.forEach((h, i) => {
    if (String(h||'').includes('是否在看板显示')) return;
    if (sheet.columnVisible && i < sheet.columnVisible.length && !sheet.columnVisible[i]) return;
    visCols.push(i);
  });

  let html = '<table><thead><tr>';
  visCols.forEach(i => {
    const h = header[i];
    html += `<th>${h||''}</th>`;
  });
  html += '</tr></thead><tbody>';
  filtered.forEach(row => {
    html += '<tr>';
    visCols.forEach(i => {
      const val = row[i] !== undefined ? String(row[i]) : '';
      html += `<td><div class="ci">${i === statusCol ? statusBadge(val) : escapeHtml(val)}</div></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  wrapper.innerHTML = html;
}

function toggleSort(col) {
  sortCol = sortCol === col ? (sortDir = -sortDir, col) : (sortDir = 1, col);
  applyFilters();
}

// ==================== CARD VIEW (Integrated across all sheets) ====================
function buildProjectIndex() {
  const s1 = findSheet('投资概览');
  const s2 = findSheet('特殊股东');
  const s3 = findSheet('风险点');
  const s4 = findSheet('日期');

  const nameCol1 = s1 ? findColIdx(s1.rows[0], ['项目名称']) : -1;
  const nameCol2 = s2 ? findColIdx(s2.rows[0], ['项目名称']) : -1;
  const nameCol3 = s3 ? findColIdx(s3.rows[0], ['项目名称']) : -1;
  const nameCol4 = s4 ? findColIdx(s4.rows[0], ['项目名称']) : -1;

  // Index data by project name from each sheet
  let idx1 = {}, idx2 = {}, idx3 = {}, idx4 = {};

  if (s1 && nameCol1 >= 0) {
    for (let r = 1; r < s1.rows.length; r++) {
      const nm = String(s1.rows[r][nameCol1] || '').trim();
      if (nm) idx1[nm] = s1.rows[r];
    }
  }
  if (s2 && nameCol2 >= 0) {
    for (let r = 1; r < s2.rows.length; r++) {
      const nm = String(s2.rows[r][nameCol2] || '').trim();
      if (nm) idx2[nm] = s2.rows[r];
    }
  }
  if (s3 && nameCol3 >= 0) {
    for (let r = 1; r < s3.rows.length; r++) {
      const nm = String(s3.rows[r][nameCol3] || '').trim();
      if (nm) { if (!idx3[nm]) idx3[nm] = []; idx3[nm].push(s3.rows[r]); }
    }
  }
  if (s4 && nameCol4 >= 0) {
    for (let r = 1; r < s4.rows.length; r++) {
      const nm = String(s4.rows[r][nameCol4] || '').trim();
      if (nm) { if (!idx4[nm]) idx4[nm] = []; idx4[nm].push(s4.rows[r]); }
    }
  }

  return { idx1, idx2, idx3, idx4, s1, s2, s3, s4 };
}

						'<span class="card-star '+(isStarred?'active':'')+'" onclick="event.stopPropagation(); toggleStar(\''+safeName+'\', event)">★</span>'+

					'<div class="card-tags">'+
						(bizKeywords ? '<span class="card-biz-kw">'+escapeHtml(bizKeywords)+'</span>' : '')+
						phaseBadge(phase)+
						(status ? statusBadge(status) : '')+
					'</div>'+
					'<div class="card-meta">'+
						'<div class="card-meta-item"><span class="label">轮次</span><span class="value">'+escapeHtml(String(d1[roundCol]||'-'))+'</span></div>'+

			'</div>';

		cardGrid.innerHTML = cardsHtml;

		if (displayed === 0) {
			cardGrid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📭</div><h3>没有匹配的项目</h3></div>';

// ==================== KEY DATES COMPUTATION ====================
function computeDateFields(row) {
  const dateStr = String(row[2] || '').trim();
  if (!dateStr || dateStr === '待确认' || dateStr === '持续关注') { row[3]=''; row[4]='待确认'; return; }
  try {
    const target = new Date(dateStr); if (isNaN(target.getTime())) { row[3]=''; row[4]='待确认'; return; }
    const today = new Date(); today.setHours(0,0,0,0); target.setHours(0,0,0,0);
    const days = Math.ceil((target - today) / 86400000);
    row[3] = String(days);
    if (days < 0) row[4] = '已逾期'; else if (days <= 90) row[4] = '临近到期'; else row[4] = '正常';
  } catch(e) { row[3]=''; row[4]='待确认'; }
}

}

// ==================== ENCRYPTED EXPORT ====================
async function encryptAndExport() {
  if (!sheetData || sheetData.length === 0) { alert('请先加载 Excel 数据'); return; }
  const pw = prompt('设置加密密码（分享给同事的密码，至少 4 位）：');
  if (!pw || pw.length < 4) { alert('密码至少 4 位'); return; }

  try {
    // Generate salt + IV
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));

    // PBKDF2 derive key
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      km, { name: 'AES-GCM', length: 256 }, false, ['encrypt']
    );

    // Encrypt data
    const plaintext = new TextEncoder().encode(JSON.stringify(sheetData));
    const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);

    // Base64 encode
    const toB64 = (arr) => btoa(String.fromCharCode(...new Uint8Array(arr)));
    const saltB64 = toB64(salt), ivB64 = toB64(iv), ctB64 = toB64(ciphertext);

    // Build export HTML — clone current document, replace init
    const htmlSrc = document.documentElement.outerHTML;

    // Find the closing </body> tag and inject the password-gate script before it
    const pwScript = `
<script>
const _SALT='${saltB64}',_IV='${ivB64}',_CT='${ctB64}';
(function(){
var overlay=document.createElement('div');
overlay.className='pw-overlay';
overlay.id='pwGate';
overlay.innerHTML='<div class="pw-box"><h2>歌华丝路基金项目风险控制表</h2><div class="pw-sub">请输入密码查看</div><input type="password" id="pwInput" placeholder="输入密码后按回车" autofocus><div class="pw-err" id="pwErr"></div></div>';
document.body.appendChild(overlay);
var inp=document.getElementById('pwInput');
inp.addEventListener('keydown',async function(e){
  if(e.key!=='Enter')return;
  var pw=e.target.value;
  if(!pw)return;
  try{
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:Uint8Array.from(atob(_SALT),c=>c.charCodeAt(0)),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var ct=Uint8Array.from(atob(_CT),c=>c.charCodeAt(0));
    var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:Uint8Array.from(atob(_IV),c=>c.charCodeAt(0))},key,ct);
    sheetData=JSON.parse(new TextDecoder().decode(plain));
    document.getElementById('pwGate').remove();
    buildUI();
    document.getElementById('dropZone').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
    document.getElementById('btnSelect').textContent='已加密载入';
    document.getElementById('syncText').textContent='🔒 加密模式';
    document.getElementById('syncDot').className='sync-dot on';
  }catch(ex){
    document.getElementById('pwErr').textContent='密码错误，请重试';
    e.target.value='';
  }
});
})();
<\/script>`;

    // Remove the encrypt button and URL/token inputs from export (not needed for viewers)
    let exportHtml = htmlSrc;
    exportHtml = exportHtml.replace(/<button[^>]*btnEncrypt[^>]*>.*?<\/button>/g, '');
    exportHtml = exportHtml.replace(/<input[^>]*tokenInput[^>]*>/g, '');
    exportHtml = exportHtml.replace(/<input[^>]*urlInput[^>]*>/g, '');

    // Also remove EMBEDDED_DATA from source (encrypted data replaces it)
    exportHtml = exportHtml.replace(/<script>\nconst EMBEDDED_DATA = .*?<\/script>\n/g, '');

    // Insert password gate script before </body>
    exportHtml = exportHtml.replace('</body>', pwScript + '\n</body>');

    // Update footer
    exportHtml = exportHtml.replace(
      /<div class="footer">.*?<\/div>/,
      '<div class="footer">🔒 加密版 · 输入密码后解密数据 · 数据不在服务器留存</div>'
    );

    // Download
    const blob = new Blob([exportHtml], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '歌华丝路基金项目风险控制表_加密版.html';
    a.click();
    URL.revokeObjectURL(url);
    alert('✅ 加密版已生成！\n\n发送给同事，告知密码即可。\n文件可放心放在公开 GitHub 上。');
  } catch(e) {
    alert('加密失败: ' + e.message);
  }
}

(function(){
var overlay=document.createElement('div');
overlay.className='pw-overlay';
overlay.id='pwGate';
overlay.innerHTML='<div class="pw-box"><h2>歌华丝路基金项目风险控制表</h2><div class="pw-sub">请输入密码查看</div><input type="password" id="pwInput" placeholder="输入密码后按回车" autofocus><div class="pw-err" id="pwErr"></div></div>';
document.body.appendChild(overlay);
var inp=document.getElementById('pwInput');
inp.addEventListener('keydown',async function(e){
  if(e.key!=='Enter')return;
  var pw=e.target.value;
  if(!pw)return;
  try{
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:Uint8Array.from(atob(_SALT),c=>c.charCodeAt(0)),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var ct=Uint8Array.from(atob(_CT),c=>c.charCodeAt(0));
    var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:Uint8Array.from(atob(_IV),c=>c.charCodeAt(0))},key,ct);
    sheetData=JSON.parse(new TextDecoder().decode(plain));
    document.getElementById('pwGate').remove();
    buildUI();
    document.getElementById('dropZone').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
    document.getElementById('btnSelect').textContent='已加密载入';
    document.getElementById('syncText').textContent='🔒 加密模式';
    document.getElementById('syncDot').className='sync-dot on';
  }catch(ex){
    document.getElementById('pwErr').textContent='密码错误，请重试';
    e.target.value='';
  }
});
})();
</script>
